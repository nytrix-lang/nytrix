<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Nytrix logo</title>
  <desc id="desc">A minimal monochrome purple citrus slice.</desc>
  <defs>
    <style>
      :root { color: #7f77dd; }
      .pulp {
        fill: #17142a;
      }
      .line {
        fill: none;
        stroke: #6f68cf;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .outline {
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .spoke {
        fill: none;
        stroke: #6f68cf;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .bubble {
        fill: none;
        stroke: currentColor;
        stroke-width: 3;
      }
      .bubble-small {
        fill: currentColor;
      }
      .bubble-glint {
        fill: currentColor;
      }
    </style>
  </defs>

  <g class="bubbles">
    <circle class="bubble-small" cx="248" cy="142" r="2.4" />
    <circle class="bubble" cx="306" cy="88" r="4.7" />
    <circle class="bubble-small" cx="326" cy="221" r="3" />
    <circle class="bubble" cx="362" cy="158" r="5.8" />
    <circle class="bubble-small" cx="384" cy="58" r="2.6" />
    <circle class="bubble" cx="416" cy="134" r="10.8" />
    <circle class="bubble-glint" cx="411" cy="129" r="2" />
    <circle class="bubble-small" cx="442" cy="210" r="3.1" />
    <circle class="bubble" cx="456" cy="88" r="5" />
  </g>

  <g transform="translate(256 256) scale(1.58) translate(-256 -256)">
    <g transform="translate(512 0) scale(-1 1) rotate(-34 256 264)">
      <path
        class="pulp"
        d="M110 228
           H402
           A146 146 0 0 1 110 228
           Z" />

      <g class="spoke" stroke-width="4.1">
        <path d="M256 229 L141 259" />
        <path d="M256 229 L172 313" />
        <path d="M256 229 L256 347" />
        <path d="M256 229 L340 313" />
        <path d="M256 229 L371 259" />
      </g>

      <path
        class="line"
        stroke-width="5.2"
        d="M137 228
           A119 119 0 0 0 375 228" />

      <circle class="pulp" cx="256" cy="229" r="4.4" />

      <path
        class="outline"
        stroke-width="10.8"
        d="M110 228
           H402
           A146 146 0 0 1 110 228
           Z" />
    </g>
  </g>
</svg>
