name: test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-ubuntu:
    runs-on: Linux
    steps:
      - uses: actions/checkout@v4
      - name: test
        run: python3 -B ./make test
  test-macos:
    runs-on: macOS
    steps:
      - uses: actions/checkout@v4
      - name: test
        run: python3 -B ./make test
  test-windows:
    runs-on: Windows
    steps:
      - uses: actions/checkout@v4
      - name: test
        shell: cmd
        run: python3 -B ./make test
