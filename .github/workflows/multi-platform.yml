name: test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-ubuntu:
    runs-on: Linux
    env:
      NYTRIX_TEST_FULL: "1"
    steps:
      - uses: actions/checkout@v4
      - name: test
        run: python3 -B ./make test
  test-macos:
    runs-on: macOS
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      HOMEBREW_NO_ENV_HINTS: "1"
      NYTRIX_TEST_FULL: "1"
    steps:
      - uses: actions/checkout@v4
      - name: test
        run: python3 -B ./make test
  test-windows:
    runs-on: Windows
    env:
      NYTRIX_TEST_FULL: "1"
    steps:
      - uses: actions/checkout@v4
      - name: setup msvc
        uses: ilammy/msvc-dev-cmd@v1
      - name: test
        shell: cmd
        run: python3 -B ./make test
