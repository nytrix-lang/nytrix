name: test

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Platform to test"
        required: true
        default: all
        type: choice
        options:
          - all
          - linux
          - macos
          - windows

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.target || 'all' }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-ubuntu:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'linux' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NYTRIX_BUILD_JOBS: "2"
      NYTRIX_TEST_JOBS: "2"
      NYTRIX_TEST_FULL: "1"
      NYTRIX_TEST_COLD: "1"
    steps:
      - uses: actions/checkout@v5
      - name: test
        run: python3 -B ./make test
  test-macos:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'macos' }}
    runs-on: macos-latest
    timeout-minutes: 25
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      HOMEBREW_NO_ENV_HINTS: "1"
      NYTRIX_BUILD_JOBS: "3"
      NYTRIX_TEST_JOBS: "3"
      NYTRIX_TEST_FULL: "1"
      NYTRIX_TEST_COLD: "1"
    steps:
      - uses: actions/checkout@v5
      - name: test
        run: python3 -B ./make test
  test-windows:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'windows' }}
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      NYTRIX_BUILD_JOBS: "2"
      NYTRIX_TEST_JOBS: "2"
      NYTRIX_TEST_FULL: "1"
      NYTRIX_TEST_COLD: "1"
      NYTRIX_TEST_TIMEOUT: "180"
      CC: /ucrt64/bin/clang
      CXX: /ucrt64/bin/clang++
      LLVM_CONFIG: /ucrt64/bin/llvm-config
      CMAKE_PREFIX_PATH: /ucrt64
      PKG_CONFIG_PATH: /ucrt64/lib/pkgconfig
      ZLIB_ROOT: /ucrt64
      NYTRIX_LLVM_INCLUDE: /ucrt64/include
      NYTRIX_GMP_INCLUDE: /ucrt64/include
      NYTRIX_GMP_LIBRARY: /ucrt64/lib/libgmp.dll.a
    steps:
      - uses: actions/checkout@v5
      - name: setup msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: minimal
          release: false
          cache: true
          update: false
          install: >-
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-llvm
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-gdb
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-gmp
            mingw-w64-ucrt-x86_64-zlib
      - name: test
        shell: msys2 {0}
        run: python3 -B ./make test
